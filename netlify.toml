[build]
  publish = "."
  functions = "netlify/functions"
  # Regenerate HTML from prototype + content sources, then substitute env vars
  # into the placeholders. Doing it in this order makes the build idempotent —
  # repeated deploys do not stack MISSING_* strings on top of one another.
  command = "python3 scripts/build_pages.py && python3 scripts/build_legal_pages.py && bash scripts/inject_env.sh"

# Local dev: skip the env-injection step (it mutates HTML in place).
# Netlify CLI serves the files as-is and proxies through its own router so
# the [redirects] rules below still apply for /survey, /privacy, /terms.
[dev]
  framework = "#static"
  publish = "."
  port = 8888
  autoLaunch = false

[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true
[build.processing.css]
  bundle = false
  minify = true
[build.processing.js]
  bundle = false
  minify = true
[build.processing.images]
  compress = true

# Pretty URLs — /survey serves /survey.html, /thanks serves /thanks.html, etc.
[[redirects]]
  from = "/survey"
  to = "/survey.html"
  status = 200
[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200
[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# Self-host gtag.js and Cookiebot via Netlify edge proxy. Pulls them onto
# our origin so the browser doesn't pay a separate TLS handshake per
# script, and lets Netlify's edge cache the response. The `force = true`
# ensures the rewrite applies even when files at these paths exist.
[[redirects]]
  from = "/_proxy/gtag.js"
  to = "https://www.googletagmanager.com/gtag/js"
  status = 200
  force = true
  [redirects.query]
    id = ":id"
[[redirects]]
  from = "/_proxy/cookiebot/uc.js"
  to = "https://consent.cookiebot.com/uc.js"
  status = 200
  force = true

# ============================================================================
# Cache strategy
# ============================================================================
#  - Hash-fingerprinted images and fonts → 1y immutable.
#  - Un-fingerprinted CSS/JS at fixed paths → 5min + must-revalidate +
#    stale-while-revalidate so deploys reach the browser without a hard
#    reload, and repeat visits never wait for revalidation.
#  - HTML → no browser cache, but s-maxage lets Netlify's CDN serve cached
#    HTML for 60s and revalidate in the background for the next 24h.

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate, stale-while-revalidate=86400"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate, stale-while-revalidate=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, s-maxage=60, stale-while-revalidate=86400"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, s-maxage=60, stale-while-revalidate=86400"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"

# Service worker has its own cache rule — short, must-revalidate, NO immutable.
# A stale SW that's cached forever can prevent users ever seeing updates.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
