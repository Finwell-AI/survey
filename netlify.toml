[build]
  publish = "."
  functions = "netlify/functions"
  # Regenerate HTML from prototype + content sources, then substitute env vars
  # into the placeholders. Doing it in this order makes the build idempotent —
  # repeated deploys do not stack MISSING_* strings on top of one another.
  command = "python3 scripts/build_pages.py && python3 scripts/build_legal_pages.py && bash scripts/inject_env.sh"

# Local dev: skip the env-injection step (it mutates HTML in place).
# Netlify CLI serves the files as-is and proxies through its own router so
# the [redirects] rules below still apply for /survey, /privacy, /terms.
[dev]
  framework = "#static"
  publish = "."
  port = 8888
  autoLaunch = false

[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true
[build.processing.css]
  bundle = false
  minify = true
[build.processing.js]
  bundle = false
  minify = true
[build.processing.images]
  compress = true

# Pretty URLs — /survey serves /survey.html, /thanks serves /thanks.html, etc.
[[redirects]]
  from = "/survey"
  to = "/survey.html"
  status = 200
[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200
[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# Long cache for fingerprinted assets, no cache for HTML.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
