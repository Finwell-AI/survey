[build]
  publish = "."
  functions = "netlify/functions"
  # Regenerate HTML from prototype + content sources, then substitute env vars
  # into the placeholders. Doing it in this order makes the build idempotent —
  # repeated deploys do not stack MISSING_* strings on top of one another.
  command = "python3 scripts/build_pages.py && python3 scripts/build_legal_pages.py && bash scripts/inject_env.sh"

# Local dev: skip the env-injection step (it mutates HTML in place).
# Netlify CLI serves the files as-is and proxies through its own router so
# the [redirects] rules below still apply for /survey, /privacy, /terms.
[dev]
  framework = "#static"
  publish = "."
  port = 8888
  autoLaunch = false

[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true
[build.processing.css]
  bundle = false
  minify = true
[build.processing.js]
  bundle = false
  minify = true
[build.processing.images]
  compress = true

# Pretty URLs — /survey serves /survey.html, /thanks serves /thanks.html, etc.
[[redirects]]
  from = "/survey"
  to = "/survey.html"
  status = 200
[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200
[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# ============================================================================
# Cache strategy
# ============================================================================
#  - Hash-fingerprinted images and fonts → 1y immutable.
#  - Un-fingerprinted CSS/JS at fixed paths → 5min + must-revalidate +
#    stale-while-revalidate so deploys reach the browser without a hard
#    reload, and repeat visits never wait for revalidation.
#  - HTML → no browser cache, but s-maxage lets Netlify's CDN serve cached
#    HTML for 60s and revalidate in the background for the next 24h.

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate, stale-while-revalidate=86400"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate, stale-while-revalidate=86400"

# Content-Security-Policy: explicit allow-list for the third parties we
# actually use (Cookiebot, GA4, reCAPTCHA, HubSpot Forms — the last is for
# future-proofing if HubSpot tracking is ever added). 'unsafe-inline' is
# present on script-src because the page <head> contains an inline gtag
# consent-mode bootstrap; remove it once that block is moved into app.js.
# object-src 'none' and base-uri 'self' are zero-cost wins that block the
# most severe injection scenarios.

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, s-maxage=60, stale-while-revalidate=86400"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "unsafe-none"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://consent.cookiebot.com https://www.googletagmanager.com https://www.gstatic.com https://www.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://api.hubapi.com https://www.google.com; frame-src https://www.google.com https://consent.cookiebot.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    # NB: cookiebot.com is left in the script-src + frame-src allow-list so
    # re-enabling Cookiebot (build_pages.py: COOKIEBOT_ENABLED = True) does
    # not need a CSP change.

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, s-maxage=60, stale-while-revalidate=86400"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "unsafe-none"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://consent.cookiebot.com https://www.googletagmanager.com https://www.gstatic.com https://www.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://api.hubapi.com https://www.google.com; frame-src https://www.google.com https://consent.cookiebot.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    # NB: cookiebot.com is left in the script-src + frame-src allow-list so
    # re-enabling Cookiebot (build_pages.py: COOKIEBOT_ENABLED = True) does
    # not need a CSP change.

