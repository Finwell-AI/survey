# Service worker has its own cache rule — short, must-revalidate, NO immutable.
# A stale SW that's cached forever can prevent users ever seeing updates.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
